name: .NET Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Find and restore
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($proj) {
          dotnet restore $proj.FullName
        } else {
          Write-Error "No .csproj file found"
          exit 1
        }

    - name: Build
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        dotnet build $proj.FullName --configuration Release --no-restore
