name: Check Files & Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  check-and-build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check required files exist
      run: |
        $requiredFiles = @(
          "Program.cs",
          "Chatbot.cs",
          "ResponseManager.cs",
          "UIManager.cs",
          "AudioManager.cs",
          "*.csproj"
        )
        $missing = $false
        foreach ($pattern in $requiredFiles) {
          $found = Get-ChildItem -Recurse -Filter $pattern
          if (-not $found) {
            Write-Error "Missing file: $pattern"
            $missing = $true
          }
        }
        if ($missing) { exit 1 }
        Write-Host "All required files found."

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Find and restore
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($proj) {
          dotnet restore $proj.FullName
        } else {
          Write-Error "No .csproj file found"
          exit 1
        }

    - name: Build
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        dotnet build $proj.FullName --configuration Release --no-restoreurse -Filter *.csproj | Select-Object -First 1
        dotnet build $proj.FullName --configuration Release --no-restore
